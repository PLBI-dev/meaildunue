<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 매일매일 두뇌 트레이닝 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #4a90e2; }
        .calendar-box { background: #eef5fc; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; font-size: 1.2rem; }
        .quiz-box { font-size: 1.3rem; margin: 20px 0; font-weight: bold; background: #fffde7; padding: 20px; border-radius: 10px; border: 2px dashed #ffd54f; }
        input[type="text"] { width: 80%; padding: 10px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 5px; margin-bottom: 10px; }
        button { background: #4a90e2; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 5px; cursor: pointer; transition: 0.2s; margin: 5px; }
        button:hover { background: #357abd; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .hint-btn-old { background: #ff8a80; }
        .hint-btn-old:hover { background: #e57373; }
        .hint-btn-new { background: #b2dfdb; color: #004d40; }
        .hint-btn-new:hover { background: #80cbc4; }
        .hint-text { background: #f5f5f5; padding: 10px; border-radius: 5px; margin: 10px 0; display: none; font-size: 0.95rem; }
        .result-box { display: none; margin-top: 20px; padding: 20px; background: #e8f5e9; border-radius: 10px; border: 2px solid #81c784; }
        .score { font-size: 1.5rem; color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧩 매일매일 두뇌 퀴즈</h1>
    
    <div class="calendar-box" id="today-date">📅 날짜 로딩 중...</div>
    
    <div class="quiz-box" id="quiz-question">문제를 불러오는 중입니다...</div>
    
    <input type="text" id="user-answer" placeholder="정답을 입력하세요!">
    <br>
    <button id="submit-btn" onclick="checkAnswer()">정답 제출하기 🚀</button>
    
    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
    
    <h3>💡 힌트는 딱 한 번만! 신중하게 고르세요!</h3>
    <button id="hint-btn-old" class="hint-btn-old" onclick="useHint('old')">📜 옛날 힌트 보기</button>
    <button id="hint-btn-new" class="hint-btn-new" onclick="useHint('new')">⚡ 최신 힌트 보기</button>
    
    <div id="hint-old" class="hint-text"></div>
    <div id="hint-new" class="hint-text"></div>
    
    <div id="result-area" class="result-box">
        <p class="score" id="result-message"></p>
        <p>🎉 오늘 출석 체크 완료! 내일 새로운 문제로 또 만나요!</p>
        <button onclick="shareResult()" style="background: #fbc02d; color: black;">내 결과 링크 복사하기 🔗</button>
    </div>
</div>

<script>
    // 💡 엄마와 매일 바꿀 퀴즈 데이터 은행!
    const quizDatabase = {
        0: { q: "[엄마표 사자성어] 눈에 불을 켜고 찾아본다는 뜻으로, 몹시 분해서 눈을 부릅뜨고 노려보는 것은? (힌트: 🪔👀)", a: "괄목상대", hintOld: "삼국지에 나오는 말인데, 눈을 비비고 상대방을 본다는 뜻이란다!", hintNew: "완전 몰라보게 발전한 친구 볼 때 쓰는 말! 네 글자야." },
        1: { q: "[넌센스] 세상에서 가장 장사를 잘하는 동물은?", a: "장어", hintOld: "시장에서 장사(상업)를 아주 잘하는 물고기란다.", hintNew: "이름에 '장사'할 때 '장'이 들어가!" },
        2: { q: "[초성 퀴즈] 2020년대를 뒤흔든 최고의 애니메이션 영화 제목은? \n 초성: ㅇㄹㅇㄴ", a: "엘리멘탈", hintOld: "불과 물이 나오는 아주 감동적인 만화 영화였지.", hintNew: "디즈니 픽사 작품! '디즈니 ㅇㄹㅇㄴ'" },
        3: { q: "[논리 퍼즐] '이것'은 많을수록 무게가 가벼워집니다. 청바지나 치즈에 이것이 많으면 숭숭 뚫려 보이죠. 이것은?", a: "구멍", hintOld: "바지가 찢어지면 이곳이 생기지~", hintNew: "도넛 한가운데에 있는 것!" },
        4: { q: "[트렌드 퀴즈] 맛있는 음식을 먹었을 때 요새 10대들이 '진짜 맛있다'라는 표현을 세 글자로 줄여서 뭐라고 할까요? (초성: 존ㅁㅌ)", a: "존맛탱", hintOld: "부모님 세대는 쓰기 조금 부끄러운 젊은이들 말이네 ㅎㅎ", hintNew: "JMT을 한글로 그대로 읽으면 돼!" },
        5: { q: "[속담 빈칸] '오르지 못할 나무는 (     )도 보지 마라'", a: "쳐다보지", hintOld: "애초에 가질 수 없는 거라면 마음도 주지 말라는 뜻이야.", hintNew: "눈으로 위를 향해 바라보는 행동!" },
        6: { q: "[아재개그] 왕이 궁궐에 가기 싫을 때 하는 말은?", a: "궁시렁", hintOld: "왕이 사는 곳은 '궁'이고, 투덜대는 소리를 합쳐봐.", hintNew: "투덜투덜 불만을 말할 때 쓰는 세 글자 의성어야!" }
    };

    const today = new Date();
    const dayOfWeek = today.getDay(); 
    const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
    
    document.getElementById('today-date').innerText = "📅 " + today.toLocaleDateString('ko-KR', options);
    
    const currentQuiz = quizDatabase[dayOfWeek];
    document.getElementById('quiz-question').innerText = currentQuiz.q;
    document.getElementById('hint-old').innerText = "📜 옛날 힌트: " + currentQuiz.hintOld;
    document.getElementById('hint-new').innerText = "⚡ 최신 힌트: " + currentQuiz.hintNew;

    // 🌟 [수정] 힌트를 딱 하나만 쓰게 만드는 함수
    function useHint(type) {
        // 선택한 힌트 열기
        document.getElementById('hint-' + type).style.display = 'block';
        
        // 🔒 두 힌트 버튼 모두 비활성화해서 더 못 누르게 막기
        document.getElementById('hint-btn-old').disabled = true;
        document.getElementById('hint-btn-new').disabled = true;
    }

    let savedAge = 20;

    function checkAnswer() {
        const inputField = document.getElementById('user-answer');
        const submitBtn = document.getElementById('submit-btn');
        const userAnswer = inputField.value.trim().replace(/\s+/g, ''); 
        const correctAnswer = currentQuiz.a.replace(/\s+/g, '');
        
        const resultArea = document.getElementById('result-area');
        const resultMessage = document.getElementById('result-message');
        
        if (userAnswer === correctAnswer) {
            const brainAges = [15, 17, 19, 21, 23];
            savedAge = brainAges[Math.floor(Math.random() * brainAges.length)];
            
            resultArea.style.display = "block";
            resultArea.style.backgroundColor = "#e8f5e9"; 
            resultArea.style.borderColor = "#81c784";
            resultMessage.innerHTML = "🎉 정답입니다! <br> 🧠 오늘의 두뇌 나이 결과: [" + savedAge + "세]";
            
            inputField.disabled = true;
            submitBtn.disabled = true;
            submitBtn.innerText = "오늘 문제 풀기 완료 🔓";
        } else {
            resultArea.style.display = "block";
            resultArea.style.backgroundColor = "#ffebee"; 
            resultArea.style.borderColor = "#ef9a9a";
            resultMessage.innerHTML = "❌ 아쉽게도 오답이에요! <br> 힌트를 다시 한번 읽고 도전해 보세요!";
        }
    }

    function shareResult() {
        const textToCopy = "[매일매일 두뇌 퀴즈]\n나 오늘 퀴즈 맞히고 두뇌 나이 " + savedAge + "세 나왔어! 🔥\n너도 한 번 도전해봐!";
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("📋 결과 메시지가 복사되었습니다! 카톡창에 바로 붙여넣기(Ctrl+V) 해보세요!");
        }).catch(err => {
            alert("복사에 실패했습니다. 직접 복사해 주세요!");
        });
    }
</script>

</body>
</html>
